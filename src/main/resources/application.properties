spring.datasource.url=jdbc:postgresql://localhost:5432/uit_cinema?serverTimezone=Asia/Ho_Chi_Minh
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.generate-ddl=true
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.properties.hibernate.format_sql=false


app.email-verification.expire-minutes=10
app.email-verification.mock-send=true
app.email-verification.from=noreply@cinema-portal.local
app.email-verification.verify-url=http://localhost:8080/user/verify-email?token=

app.jwt.secret=cinema-portal-super-secret-key-change-me-2026
app.jwt.expiration-ms=86400000

# SMTP config (example for Gmail App Password)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=your_email@gmail.com
spring.mail.password=your_gmail_app_password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

#server.address=192.168.163.1
server.address=127.0.0.1
#server.address=192.168.1.10
#server.address=10.91.10.85
server.port=8080
#Swagger
springdoc.api-docs.path=/api-docs

# Data Seeder - Disabled, using SQL seed-data.sql instead
app.seed.enabled=false

